{% extends "base.html" %}

{% block title %}Registro - Biblioteca Digital{% endblock %}

{% block content %}
<div class="login-container">
    <div class="card shadow">
        <div class="card-body">
            <div class="text-center mb-4">
                <i class="fas fa-user-plus fa-3x text-success"></i>
                <h2 class="mt-3">Crear Cuenta</h2>
                <p class="text-muted">Regístrate para acceder al repositorio</p>
            </div>

            <form method="POST">
                <div class="mb-3">
                    <label for="username" class="form-label">
                        <i class="fas fa-user"></i> Usuario
                    </label>
                    <input type="text" class="form-control" id="username" name="username" required>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">
                        <i class="fas fa-envelope"></i> Email
                    </label>
                    <input type="email" class="form-control" id="email" name="email" required>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">
                        <i class="fas fa-lock"></i> Contraseña
                    </label>
                    <input type="password" class="form-control" id="password" name="password" required>
                </div>

                <button type="submit" class="btn btn-success w-100">
                    <i class="fas fa-user-plus"></i> Crear Cuenta
                </button>
            </form>

            <div class="text-center mt-3">
                <p class="text-muted">¿Ya tienes cuenta? <a href="{{ url_for('login') }}">Inicia sesión aquí</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
