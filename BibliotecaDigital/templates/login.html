{% extends "base.html" %}

{% block title %}Iniciar Sesión - Biblioteca Digital{% endblock %}

{% block content %}
<div class="login-container">
    <div class="card shadow">
        <div class="card-body">
            <div class="text-center mb-4">
                <i class="fas fa-book fa-3x text-primary"></i>
                <h2 class="mt-3">Biblioteca Digital</h2>
                <p class="text-muted">Inicia sesión para acceder al repositorio</p>
            </div>

            <form method="POST">
                <div class="mb-3">
                    <label for="username" class="form-label">
                        <i class="fas fa-user"></i> Usuario
                    </label>
                    <input type="text" class="form-control" id="username" name="username" required>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">
                        <i class="fas fa-lock"></i> Contraseña
                    </label>
                    <input type="password" class="form-control" id="password" name="password" required>
                </div>

                <button type="submit" class="btn btn-primary w-100">
                    <i class="fas fa-sign-in-alt"></i> Iniciar Sesión
                </button>
            </form>

            <div class="text-center mt-3">
                <p class="text-muted">¿No tienes cuenta? <a href="{{ url_for('register') }}">Regístrate aquí</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
